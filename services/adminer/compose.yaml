name: ${COMPOSE_PROJECT_NAME}

services:
  adminer:
    image: ${ADMINER_IMAGE}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${ADMINER_PORT}:8080"

    environment:
      TZ: ${TZ}

    networks:
      - backbone

networks:
  backbone:
    external: true
    name: ${HOMELAB_BACKBONE_NETWORK}
