services:
  app:
    build:
      context: ./app
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      APP_PORT: ${APP_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES}
      DB_CONNECT_RETRY_DELAY: ${DB_CONNECT_RETRY_DELAY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backbone

networks:
  backbone:
    external: true
    name: ${HOMELAB_BACKBONE_NETWORK}
