services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped

    environment:
      - TZ=${TZ}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - backbone

networks:
  backbone:
    external: true
    name: ${HOMELAB_BACKBONE_NETWORK}
