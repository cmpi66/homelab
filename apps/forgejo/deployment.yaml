apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate # single-writer PVC; dont do RollingUpdate with RWO
  selector:
    matchLabels: { app: forgejo }
  template:
    metadata:
      labels: { app: forgejo }
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:14
          ports:
            - { name: http, containerPort: 3000 }
            - { name: ssh, containerPort: 22 }
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__server__ROOT_URL
              value: "https://forgejo.home.arpa"
            - name: FORGEJO__server__DOMAIN
              value: "forgejo.home.arpa"
            - name: FORGEJO__database__DB_TYPE
              value: "postgres"
            - name: FORGEJO__database__HOST
              value: "postgres-rw.forgejo.svc:5432"
            - name: FORGEJO__database__NAME
              value: "forgejo"
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: username
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
          volumeMounts:
            - { name: data, mountPath: /var/lib/gitea }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
