apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: linkding
spec:
  replicas: 1
  strategy:
    type: Recreate # single-writer PVC; dont do RollingUpdate with RWO
  selector:
    matchLabels: { app: linkding }
  template:
    metadata:
      labels: { app: linkding }
    spec:
      containers:
        - name: linkding
          image: sissbruecker/linkding:latest
          ports:
            - { name: http, containerPort: 9090 }
          env:
            - name: LD_DB_ENGINE
              value: "postgres"
            - name: LD_DB_HOST
              value: "postgres-linkding-rw.linkding.svc"
            - name: LD_DB_PORT
              value: "5432"
            - name: LD_DB_DATABASE
              value: "linkding"
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-linkding-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-linkding-app
                  key: password
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
